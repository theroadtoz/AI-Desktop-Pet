<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet Chat</title>
  </head>
  <body>
    <main class="chat-shell">
      <div class="provider-bar">
        <section id="provider-status" class="status-box" aria-live="polite">正在读取模型状态...</section>
        <button id="settings-button" class="button-light icon-button" type="button" aria-label="打开 Provider 设置" title="Provider 设置">⚙</button>
      </div>
      <nav class="subpage-nav" aria-label="聊天导航">
        <button id="chat-tab" class="subpage-tab is-active" type="button">聊天</button>
        <button id="history-tab" class="subpage-tab" type="button">历史</button>
        <button id="memory-tab" class="subpage-tab" type="button">记忆</button>
      </nav>
      <section id="settings-panel" class="settings-panel" hidden aria-label="Provider 设置">
        <div class="settings-header">
          <h2>Provider 设置</h2>
          <button id="settings-close-button" class="button-light" type="button">关闭</button>
        </div>
        <form id="settings-form" class="content-stack">
          <section class="content-stack" aria-labelledby="pet-scale-title">
            <h3 id="pet-scale-title" class="settings-section-title">桌宠显示</h3>
            <label class="field-label">
              桌宠大小
              <input id="pet-scale" name="petScale" type="range" min="0.70" max="1.35" step="0.05" value="1.00" />
            </label>
            <output id="pet-scale-value" class="status-box" aria-live="polite">1.00 倍</output>
            <label class="field-label">
              角色配件
              <select id="pet-accessory" name="petAccessory">
                <option value="none">无配件</option>
                <option value="glasses">眼镜</option>
              </select>
            </label>
            <p id="pet-accessory-status" class="status-box" aria-live="polite">角色配件：无配件</p>
            <p id="pet-lock-status" class="status-box" aria-live="polite">桌宠锁定：未锁定</p>
            <div class="settings-actions">
              <button id="save-pet-scale-button" class="button-light" type="button">保存桌宠大小</button>
              <button id="save-pet-accessory-button" class="button-light" type="button">保存角色配件</button>
              <button id="toggle-pet-lock-button" class="button-light" type="button">锁定桌宠</button>
            </div>
          </section>
          <section class="content-stack" aria-labelledby="shortcut-title">
            <h3 id="shortcut-title" class="settings-section-title">快捷键</h3>
            <div id="shortcut-list" class="shortcut-list content-stack" aria-live="polite"></div>
            <p id="shortcut-status" class="status-box" hidden aria-live="polite"></p>
          </section>
          <label class="field-label">
            Provider
            <select id="provider-id" name="providerId">
              <option value="fake">Fake</option>
              <option value="openai-compatible">OpenAI-compatible</option>
            </select>
          </label>
          <label class="field-label">
            显示名称
            <input id="provider-display-name" name="displayName" type="text" required />
          </label>
          <div id="openai-fields" class="content-stack" hidden>
            <label class="field-label">
              Base URL
              <input id="provider-base-url" name="baseURL" type="url" inputmode="url" required />
            </label>
            <label class="field-label">
              模型
              <input id="provider-model" name="model" type="text" required />
            </label>
            <div class="field-grid">
              <label class="field-label">
                温度
                <input id="provider-temperature" name="temperature" type="number" step="any" required />
              </label>
              <label class="field-label">
                最大 Token
                <input id="provider-max-tokens" name="maxTokens" type="number" min="1" step="1" required />
              </label>
              <label class="field-label">
                超时时间（毫秒）
                <input id="provider-timeout" name="timeoutMs" type="number" min="1" step="1" required />
              </label>
            </div>
            <div class="api-key-section">
              <span id="api-key-status" class="status-box" aria-live="polite">API Key：未配置</span>
              <label class="field-label">
                更新 API Key
                <input id="provider-api-key" name="apiKey" type="password" autocomplete="new-password" placeholder="留空则不更新" />
              </label>
              <button id="delete-api-key-button" class="button-danger" type="button">删除 API Key</button>
              <div id="delete-key-confirmation" class="status-box delete-confirmation" hidden>
                <span>删除后无法恢复，是否继续？</span>
                <span class="inline-actions">
                  <button id="cancel-delete-api-key-button" class="button-light" type="button">取消</button>
                  <button id="confirm-delete-api-key-button" class="button-danger" type="button">确认删除</button>
                </span>
              </div>
            </div>
          </div>
          <div class="settings-actions">
            <button class="button" type="submit">保存设置</button>
          </div>
          <p id="settings-feedback" class="status-box" hidden aria-live="polite"></p>
        </form>
      </section>
      <section id="chat-page" class="chat-page">
        <p id="chat-session-note" class="selection-note" aria-live="polite">新会话将仅在本地保存；发送时只包含当前消息。</p>
        <section id="memory-draft-panel" class="memory-draft-panel content-stack" hidden aria-label="保存事实卡">
          <p class="selection-note">确认后才会保存到本机记忆；可随时在记忆页停用或删除。</p>
          <label class="field-label">
            标题
            <input id="memory-draft-title" type="text" maxlength="80" />
          </label>
          <label class="field-label">
            正文
            <textarea id="memory-draft-content" maxlength="800"></textarea>
          </label>
          <label class="field-label">
            标签
            <input id="memory-draft-tags" type="text" placeholder="用逗号分隔，可留空" />
          </label>
          <div class="settings-actions">
            <button id="cancel-memory-draft-button" class="button-light" type="button">取消</button>
            <button id="save-memory-draft-button" class="button" type="button">保存事实卡</button>
          </div>
        </section>
        <section id="messages" class="messages" aria-live="polite"></section>
        <form id="chat-form" class="composer">
          <input id="chat-input" type="text" autocomplete="off" placeholder="和她说点什么..." />
          <button id="send-button" class="button" type="submit">发送</button>
          <button id="abort-button" class="button-light" type="button" disabled>中断</button>
        </form>
      </section>
      <section id="history-page" class="history-page content-stack" hidden aria-label="本地聊天历史">
        <div class="history-actions">
          <button id="new-conversation-button" class="button" type="button">新建会话</button>
          <button id="clear-history-button" class="button-danger" type="button">清空全部历史</button>
        </div>
        <p id="history-feedback" class="selection-note" aria-live="polite">历史仅保存在本机，不会自动上传或发送给 Provider。</p>
        <div id="clear-history-confirmation" class="status-box delete-confirmation" hidden>
          <span>清空后无法恢复，是否继续？</span>
          <span class="inline-actions">
            <button id="cancel-clear-history-button" class="button-light" type="button">取消</button>
            <button id="confirm-clear-history-button" class="button-danger" type="button">确认清空</button>
          </span>
        </div>
        <div class="history-layout">
          <ol id="conversation-list" class="conversation-list" aria-label="会话列表"></ol>
          <section id="history-detail" class="history-detail content-stack" aria-live="polite">
            <p class="selection-note">选择一段历史以查看内容。</p>
          </section>
        </div>
      </section>
      <section id="memory-page" class="memory-page content-stack" hidden aria-label="本地记忆">
        <div class="memory-actions">
          <button id="enable-memory-button" class="button" type="button">开启记忆</button>
          <button id="clear-memory-button" class="button-danger" type="button">清空全部记忆</button>
        </div>
        <p id="memory-feedback" class="selection-note" aria-live="polite">记忆默认关闭；开启后仅已启用事实卡会临时加入 Provider 请求。</p>
        <div id="clear-memory-confirmation" class="status-box delete-confirmation" hidden>
          <span>清空后无法恢复，是否继续？</span>
          <span class="inline-actions">
            <button id="cancel-clear-memory-button" class="button-light" type="button">取消</button>
            <button id="confirm-clear-memory-button" class="button-danger" type="button">确认清空</button>
          </span>
        </div>
        <label class="field-label">
          搜索记忆
          <input id="memory-search" type="search" placeholder="标题、正文或标签" />
        </label>
        <div id="memory-list" class="memory-list content-stack"></div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
